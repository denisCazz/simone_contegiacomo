worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request_method $request_uri $server_protocol" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip (fallback — astro-compressor pre-comprime in .gz e .br)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brotli static (serve file .br pre-compressi se disponibili)
    # Richiede ngx_brotli module — se non disponibile, nginx usa gzip
    # brotli_static on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Cache immutabile per assets con hash (/_astro/*)
        location /_astro/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Cache per immagini e font
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=2592000" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Cache breve per HTML (permette aggiornamenti rapidi)
        location ~* \.html$ {
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # SPA-like fallback: prova file, poi directory, poi index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Blocca accesso a file nascosti
        location ~ /\. {
            deny all;
            return 404;
        }

        # Pagina errore 404
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
